<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kaixiang Zhang</title>
    <link rel="stylesheet" href="src/styles.css" />
    <link rel="icon" href="assets/img/kirby.png" type="image/png" />
    <link rel="preload" as="image" href="assets/img/west-lake.png" />
    <link rel="preload" as="image" href="assets/img/name.png" />
    <link rel="preload" as="image" href="assets/img/baoshu.png" />
    <link rel="preload" as="image" href="assets/img/hehua.png" />
    <link rel="preload" as="image" href="assets/img/ting.png" />
    <link rel="preload" as="image" href="assets/img/santan.png" />
  </head>
  <body>
    <div id="app">
      <div id="lake-container">
        <img id="lake" src="assets/img/west-lake.png" alt="West Lake" />

        <!-- Map markers overlayed on the lake (full-size buttons) -->
        <button
          class="marker marker-baoshu"
          type="button"
          aria-label="保俶塔"
          data-page="Bio"
        ></button>
        <button
          class="marker marker-hehua"
          type="button"
          aria-label="曲院风荷"
          data-page="Research"
        ></button>
        <button
          class="marker marker-ting"
          type="button"
          aria-label="集贤亭"
          data-page="Fun"
        ></button>
        <button
          class="marker marker-santan"
          type="button"
          aria-label="三潭印月"
          data-page="Projects"
        ></button>
      </div>

      <!-- Landing: name + start button -->
      <div id="landingUI">
        <img id="landingName" src="assets/img/name.png" alt="Kaixiang Zhang" />
        <button id="startBtn" type="button">Enter</button>
      </div>

      <!-- Map view: header (shown after Start) -->
      <header id="header">
        <img id="headerName" src="assets/img/name.png" alt="Kaixiang Zhang" />
      </header>

    </div>
    <script src="src/main.js" defer></script>
  </body>
</html>
